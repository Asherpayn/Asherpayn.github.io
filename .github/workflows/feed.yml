name: Generate Atom Feed

on:
  push:
    paths:
      - "posts/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate feed
        run: python generate_feed.py

      - name: Commit and push atom.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add atom.xml
          git diff --staged --quiet || git commit -m "chore: regenerate atom.xml"
          git push
